<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Acervo 3D - Museu Histórico de São José</title>
  <link rel="stylesheet" href="/src/style.css" />

  <style>
        /* Reset básico para remover margens padrões */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #111; /* Cor de fundo apenas para destaque */
        }

        /* Estilização do Cabeçalho principal */
        .header-container {
            background-color: #000000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            width: 100%;
            min-height: 100px;
            border-bottom: 1px solid #333; /* Uma linha sutil no fundo */
        }

        /* Bloco da Esquerda: Logos e Título */
        .logo-section {
            display: flex;
            align-items: center;
            gap: 20px; /* Aumentado ligeiramente para melhor espaçamento */
        }

        /* Contêiner da logo da prefeitura integrada */
        .logo-pref-container {
            display: flex;
            align-items: center;
            padding-right: 20px;
            /* Esta linha divisória substitui a borda simulada anterior */
            border-right: 1px solid rgba(255, 255, 255, 0.3); 
        }

        /* Estilização da imagem da logo */
        .logo-pref-img {
            /* Ajuste a altura conforme necessário para o seu layout */
            height: 60px; 
            width: auto; /* Mantém a proporção */
            display: block;
        }

        /* Título do Museu */
        .museum-title {
            color: #ffffff;
            font-size: 19px; /* Ajuste sutil no tamanho */
            font-weight: 500;
            line-height: 1.2;
        }

        /* Menu de Navegação */
        .nav-menu {
            display: flex;
            align-items: center;
            gap: 30px; /* Espaçamento entre os links */
        }

        .nav-item {
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            text-align: center;
            transition: color 0.2s ease;
            white-space: pre-line; /* Permite a quebra de linha nos itens compostos */
            line-height: 1.3;
        }

        /* Destaque azul no item "Início" como na imagem original */
        .nav-item.active {
            color: #007bff; 
        }

        /* Efeito ao passar o mouse */
        .nav-item:hover {
            color: #007bff;
        }

        /* Responsividade para telas menores */
        @media (max-width: 1024px) {
            .logo-section {
                gap: 15px;
            }
            .logo-pref-img {
                height: 50px;
            }
            .museum-title {
                font-size: 17px;
            }
            .nav-menu {
                gap: 20px;
            }
        }

        @media (max-width: 850px) {
            .header-container {
                flex-direction: column;
                gap: 25px;
                padding: 20px;
                align-items: flex-start; /* Alinha tudo à esquerda em telas pequenas */
            }
            .logo-pref-container {
                border-right: none;
                padding-right: 0;
            }
            .nav-menu {
                flex-wrap: wrap;
                justify-content: flex-start;
                gap: 15px;
                width: 100%;
            }
        }
    </style>
 
</head>
<body>
  <header class="header-container">
        <div class="logo-section">
            <div class="logo-pref-container">
                <img src="../public/img/logo.webp" alt="Logo Prefeitura de São José" class="logo-pref-img">
            </div>
            <div class="museum-title">
                Museu<br>Histórico<br>de São José
            </div>
        </div>

        <nav class="nav-menu">
            <a href="#" class="nav-item active">Início</a>
            <a href="#" class="nav-item">Sobre</a>
            <a href="#" class="nav-item">Coleções&#10;Culturais</a>
            <a href="#" class="nav-item">Acervo</a>
            <a href="#" class="nav-item">Artigos</a>
            <a href="#" class="nav-item">Tour&#10;Virtual</a>
            <a href="#" class="nav-item">Nossos&#10;Vídeos</a>
            <a href="#" class="nav-item">Nossos&#10;Jogos</a>
        </nav>
    </header>


  <main id="gallery" class="gallery"></main>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button id="close-btn" class="close-btn">&times;</button>
      
      <div id="modal-loading" class="loading-overlay">
        <div class="spinner"></div>
        <p>Carregando Modelo 3D...</p>
      </div>

      <div id="modal-canvas-container"></div>
      <div id="load-time-display" class="load-time hidden">⏱ 0.00s</div>
    </div>
  </div>

  

<script type="module" src="/src/main.js"></script>
</body>
</html>

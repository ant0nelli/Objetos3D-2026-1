<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Acervo - Museu Histórico</title>
  <link rel="stylesheet" href="/src/style.css">
  <style>
    /* Estilos específicos para o popup de informações */
    .info-container { display: flex; gap: 20px; padding: 20px; }
    .info-image { width: 40%; border-radius: 8px; object-fit: cover; }
    .info-text { width: 60%; }
    .view-3d-btn { 
      margin-top: 20px; padding: 12px 24px; background: #3b82f6; 
      color: white; border: none; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; gap: 8px; font-weight: bold;
    }
    .view-3d-btn:hover { background: #2563eb; }
    /* Controle de visibilidade dentro do modal */
    .view-section { transition: opacity 0.3s ease; }
  </style>
</head>

<body>

  <header class="header">
    <h1>Acervo Histórico</h1>
    <p>Explore as peças do museu e visualize em 3D.</p>
    <a href="/3d-models.html">Galeria 3D</a>
  </header>

  <main id="acervo-gallery" class="gallery"></main>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button id="close-btn" class="close-btn">&times;</button>
      
      <div id="section-info" class="view-section">
        <div class="info-container">
          <img id="item-img" src="" alt="Foto do objeto" class="info-image">
          <div class="info-text">
            <h2 id="item-title">Título do Objeto</h2>
            <p id="item-description">Descrição detalhada do item aparecerá aqui...</p>
            <button id="activate-3d-btn" class="view-3d-btn">
              <span>🏛️</span> Visualizar em 3D
            </button>
          </div>
        </div>
      </div>

      <div id="section-3d" class="view-section hidden" style="height: 100%;">
        <div id="modal-loading" class="loading-overlay">
          <div class="spinner"></div>
          <p>Preparando visualização 3D...</p>
        </div>
        <div id="modal-canvas-container" style="width: 100%; height: 100%;"></div>
      </div>
      
    </div>
  </div>

  <script type="module" src="/src/acervo.js"></script>
</body>

</html>
